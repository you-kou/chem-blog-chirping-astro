name: PR Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: github.actor != 'imgbot[bot]'
    outputs:
      run_lint_format: ${{ steps.detect.outputs.run_lint_format }}
      run_typecheck: ${{ steps.detect.outputs.run_typecheck }}
      run_build: ${{ steps.detect.outputs.run_build }}

    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          # Non-PR events always run everything
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run_lint_format=true" >> "$GITHUB_OUTPUT"
            echo "run_typecheck=true" >> "$GITHUB_OUTPUT"
            echo "run_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-only --diff-filter=ACMR \
            "${{ github.event.pull_request.base.sha }}...HEAD" > .ci-changed.txt

          run_lint_format=false
          run_typecheck=false
          run_build=false

          if grep -qE '\.(astro|ts|tsx|js|jsx|md|mdx|css|json)$' .ci-changed.txt; then
            run_lint_format=true
          fi
          if grep -qE '(^src/|^astro\.config\.mjs$|^tsconfig\.json$|^package\.json$|^bun\.lock$)' .ci-changed.txt; then
            run_typecheck=true
            run_build=true
          fi

          echo "run_lint_format=${run_lint_format}" >> "$GITHUB_OUTPUT"
          echo "run_typecheck=${run_typecheck}" >> "$GITHUB_OUTPUT"
          echo "run_build=${run_build}" >> "$GITHUB_OUTPUT"

  lint-format:
    name: Lint & Format
    needs: changes
    if: needs.changes.outputs.run_lint_format == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && '0' || '1' }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only --diff-filter=ACMR \
              "${{ github.event.pull_request.base.sha }}...HEAD" \
              | grep -E '\.(astro|ts|tsx|js|jsx)$' > .ci-eslint.txt || true
          else
            git ls-files '*.astro' '*.ts' '*.tsx' '*.js' '*.jsx' > .ci-eslint.txt
          fi
          if [ -s .ci-eslint.txt ]; then
            mapfile -t files < .ci-eslint.txt
            bun eslint --max-warnings=0 "${files[@]}"
          fi

      - name: Run Prettier
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only --diff-filter=ACMR \
              "${{ github.event.pull_request.base.sha }}...HEAD" \
              | grep -E '\.(astro|ts|tsx|js|jsx|md|mdx|css|json)$' > .ci-prettier.txt || true
          else
            git ls-files '*.astro' '*.ts' '*.tsx' '*.js' '*.jsx' '*.md' '*.mdx' '*.css' '*.json' > .ci-prettier.txt
          fi
          if [ -s .ci-prettier.txt ]; then
            mapfile -t files < .ci-prettier.txt
            bun prettier --check "${files[@]}"
          fi

  typecheck:
    name: Typecheck
    needs: changes
    if: needs.changes.outputs.run_typecheck == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run typecheck
        run: bun run typecheck

  build:
    name: Build
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.run_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        env:
          CI_SKIP_AUTO_OG_IMAGE: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
          CI_SKIP_RSS_SITEMAP: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
          CI_SKIP_CONTENT_COLLECTIONS: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
        run: bun run build

  status:
    name: PR Checks Status
    needs: [changes, lint-format, typecheck, build]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Verify results
        shell: bash
        run: |
          set -euo pipefail

          results=(
            "${{ needs.changes.result }}"
            "${{ needs.lint-format.result }}"
            "${{ needs.typecheck.result }}"
            "${{ needs.build.result }}"
          )

          for r in "${results[@]}"; do
            echo "  -> ${r}"
            if [ "${r}" = "failure" ] || [ "${r}" = "cancelled" ]; then
              echo "::error::One or more PR check jobs failed or were cancelled."
              exit 1
            fi
          done

          echo "All PR checks passed."
