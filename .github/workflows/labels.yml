name: Sync Labels

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/labels.yml
      - .github/workflows/labels.yml

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Sync labels
        uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.yml
          delete-other-labels: false
